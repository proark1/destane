<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DESTANE | Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#0e0e0e",
              "surface-bright": "#3a3939",
              "inverse-surface": "#e5e2e1",
              "surface-container": "#201f1f",
              "inverse-primary": "#735c00",
              "outline": "#99907c",
              "on-secondary-fixed": "#261900",
              "error": "#ffb4ab",
              "tertiary-fixed-dim": "#f1bc8c",
              "outline-variant": "#4d4635",
              "on-surface": "#e5e2e1",
              "surface-variant": "#353534",
              "tertiary-fixed": "#ffdcbf",
              "on-error-container": "#ffdad6",
              "on-tertiary-container": "#613d17",
              "on-secondary-fixed-variant": "#5d4201",
              "primary-fixed": "#ffe088",
              "secondary-container": "#604403",
              "secondary": "#e9c176",
              "tertiary-container": "#dca97a",
              "on-primary-container": "#554300",
              "on-background": "#e5e2e1",
              "secondary-fixed-dim": "#e9c176",
              "on-tertiary-fixed-variant": "#633f19",
              "on-surface-variant": "#d0c5af",
              "on-secondary-container": "#dab36a",
              "surface": "#131313",
              "on-tertiary-fixed": "#2d1600",
              "on-primary": "#3c2f00",
              "on-error": "#690005",
              "surface-container-low": "#1c1b1b",
              "background": "#131313",
              "surface-container-high": "#2a2a2a",
              "surface-dim": "#131313",
              "primary-fixed-dim": "#e9c349",
              "on-primary-fixed": "#241a00",
              "on-secondary": "#412d00",
              "tertiary": "#fac493",
              "surface-container-highest": "#353534",
              "on-primary-fixed-variant": "#574500",
              "secondary-fixed": "#ffdea5",
              "inverse-on-surface": "#313030",
              "on-tertiary": "#492905",
              "surface-tint": "#e9c349",
              "primary": "#f2ca50",
              "error-container": "#93000a",
              "primary-container": "#d4af37"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-panel {
        background: rgba(32, 31, 31, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
    </style>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body selection:bg-primary selection:text-on-primary">
<main class="min-h-screen flex flex-col items-center justify-center pt-8 pb-24 px-4 md:px-6 relative overflow-hidden">
<!-- Background Ambient Glow -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-tertiary/5 blur-[100px] rounded-full"></div>

<!-- Logo -->
<div class="mb-12 text-center">
<a href="destane_landing_page.html" class="font-headline font-extrabold text-2xl tracking-tighter text-primary no-underline">DESTANE</a>
<p class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/60 mt-2">Cinematic Securities Platform</p>
</div>

<!-- Login Form -->
<section class="w-full max-w-md">
<div class="glass-panel border border-outline-variant/10 rounded-xl p-8 md:p-10 shadow-2xl">
<div class="mb-8">
<h2 class="font-headline text-3xl font-extrabold text-on-surface tracking-tighter">Welcome Back</h2>
<p class="text-on-surface-variant mt-2 text-sm">Sign in to access your portfolio and investments.</p>
</div>

<!-- Error Message -->
<div id="error-msg" class="hidden mb-6 p-3 rounded-lg bg-error-container/20 border border-error/30 text-error text-xs font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-sm">error</span>
<span id="error-text"></span>
</div>

<form action="/auth/login" method="POST" class="space-y-6">
<div>
<label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-2 block">Email Address</label>
<input type="email" name="email" required
  class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-md px-4 py-3 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary-fixed/40 focus:ring-0 focus:outline-none transition-colors"
  placeholder="you@example.com"/>
</div>
<div>
<label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-2 block">Password</label>
<input type="password" name="password" required
  class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-md px-4 py-3 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary-fixed/40 focus:ring-0 focus:outline-none transition-colors"
  placeholder="Enter your password"/>
</div>
<button type="submit"
  class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-3.5 rounded-md transition-all active:scale-95 shadow-lg shadow-primary/10 text-sm">
  Sign In
</button>
</form>

<div class="mt-6 text-center">
<p class="text-on-surface-variant text-xs">
  Don't have an account?
  <a href="register.html" class="text-primary font-bold hover:underline">Create one</a>
</p>
</div>
</div>

<!-- Trust Footer -->
<div class="mt-6 flex justify-center items-center gap-2 opacity-50">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="font-label text-[10px] uppercase tracking-widest">Secured with AES-256 Encryption</span>
</div>
</section>
</main>

<!-- Footer -->
<footer class="w-full bg-[#0e0e0e] border-t border-[#4d4635]/20">
<div class="w-full max-w-7xl mx-auto px-12 py-12 flex flex-col items-center gap-6">
<div class="flex flex-wrap justify-center gap-8">
<a class="font-['Inter'] text-[10px] tracking-normal leading-relaxed text-[#f5f5f5]/30 hover:text-[#f2ca50] transition-opacity" href="#">Investment Disclosures</a>
<a class="font-['Inter'] text-[10px] tracking-normal leading-relaxed text-[#f5f5f5]/30 hover:text-[#f2ca50] transition-opacity" href="#">Privacy Protocol</a>
<a class="font-['Inter'] text-[10px] tracking-normal leading-relaxed text-[#f5f5f5]/30 hover:text-[#f2ca50] transition-opacity" href="#">Terms of Equity</a>
</div>
<p class="font-['Inter'] text-[10px] tracking-normal leading-relaxed text-[#f5f5f5]/30">© 2024 DESTANE. Regulated cinematic securities platform.</p>
</div>
</footer>

<script>
  // Show error from query params
  const params = new URLSearchParams(window.location.search);
  const error = params.get('error');
  if (error) {
    document.getElementById('error-msg').classList.remove('hidden');
    document.getElementById('error-text').textContent = decodeURIComponent(error);
  }
</script>
<script src="js/main.js"></script>
</body></html>
